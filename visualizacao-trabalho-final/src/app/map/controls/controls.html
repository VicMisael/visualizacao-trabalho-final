<div class="drill-control" aria-label="Nivel de detalhamento do mapa">
  <div> Nivel de Detalhamento do Mapa</div>
  @for (option of drillOptions; track option.value) {
  <div class="drill-control__button" [class.drill-control__button--active]="drillLevel() === option.value">
    {{ option.label }}
  </div>
  }
</div>
